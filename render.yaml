services:
  - type: web
    name: client-info-api
    runtime: docker
    rootDir: backend
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: client-info-db
          property: connectionString

  - type: web
    name: client-info-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_BASE_URL
        value: https://client-info-api.onrender.com

databases:
  - name: client-info-db
    plan: free
    databaseName: clientinfo
    user: clientinfo